version: '3.8'

services:
  # ============================================
  # Member 1: Voice Service
  # ============================================

  voice-service:
    build:
      context: .
      dockerfile: services/voice/Dockerfile
    container_name: gramsetu-voice
    environment:
      - BHASHINI_API_KEY=${BHASHINI_API_KEY}
      - BHASHINI_USER_ID=${BHASHINI_USER_ID}
      - SARVAM_API_KEY=${SARVAM_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8001:8000"
    volumes:
      - ./services/voice:/app/services/voice
      - ./shared:/app/shared
      - voice_models:/models
    networks:
      - gramsetu-network
    restart: unless-stopped

  # ============================================
  # Member 2: Agent Service
  # ============================================

  agent-service:
    build:
      context: .
      dockerfile: services/agent/Dockerfile
    container_name: gramsetu-agent
    environment:
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - BEDROCK_AGENT_ID=${BEDROCK_AGENT_ID}
      - BEDROCK_MODEL_ID=${BEDROCK_MODEL_ID}
      - HEADLESS_BROWSER=${HEADLESS_BROWSER:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8002:8000"
    volumes:
      - ./services/agent:/app/services/agent
      - ./shared:/app/shared
      - browser_data:/browser-data
    networks:
      - gramsetu-network
    restart: unless-stopped
    # Increase shared memory for browser
    shm_size: 2gb

  # ============================================
  # Member 3: Document Service
  # ============================================

  document-service:
    build:
      context: .
      dockerfile: services/document/Dockerfile
    container_name: gramsetu-document
    environment:
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - AADHAAR_MASK_DIGITS=${AADHAAR_MASK_DIGITS:-8}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8003:8000"
    volumes:
      - ./services/document:/app/services/document
      - ./shared:/app/shared
      - document_storage:/storage
    networks:
      - gramsetu-network
    restart: unless-stopped

  # ============================================
  # Member 4: Orchestrator Service
  # ============================================

  orchestrator:
    build:
      context: .
      dockerfile: services/orchestrator/Dockerfile
    container_name: gramsetu-orchestrator
    environment:
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_WHATSAPP_NUMBER=${TWILIO_WHATSAPP_NUMBER}
      - SECRET_KEY=${SECRET_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ./services/orchestrator:/app/services/orchestrator
      - ./shared:/app/shared
    networks:
      - gramsetu-network
    restart: unless-stopped

volumes:
  voice_models:
  browser_data:
  document_storage:


networks:
  gramsetu-network:
    driver: bridge
